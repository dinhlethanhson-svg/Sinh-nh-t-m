<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mỹ Ngọc ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 50%, #ffb3c6 100%);
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* Hiệu ứng cánh hoa rơi (TikTok style) */
        .petal {
            position: absolute;
            top: -20px;
            color: #ff85a2;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% {
                transform: translateY(0) translateX(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(105vh) translateX(100px) rotate(360deg);
                opacity: 0;
            }
        }

        /* Hiệu ứng bong bóng bay lên */
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 182, 193, 0.4);
            border-radius: 50%;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.5);
            animation: rise linear infinite;
            pointer-events: none;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-105vh) scale(1.2); opacity: 0; }
        }

        /* Giao diện kính mờ 3D (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            padding: 35px 25px;
            border-radius: 24px;
            text-align: center;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            z-index: 10;
            transition: all 0.5s ease;
        }

        /* Khu vực Bánh & Nến */
        .cake-container {
            font-size: 85px;
            margin-bottom: 15px;
            position: relative;
            display: inline-block;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .cake-container:hover {
            transform: scale(1.05);
        }
        .flame {
            position: absolute;
            top: -25px;
            left: 22px;
            font-size: 40px;
            animation: flicker 0.6s infinite alternate;
            transition: opacity 0.5s ease;
        }
        @keyframes flicker {
            from { transform: scale(1) rotate(-2deg); opacity: 0.9; }
            to { transform: scale(1.1) rotate(2deg); opacity: 1; }
        }

        .hint-text {
            font-size: 1.1rem;
            color: #c9184a;
            font-weight: bold;
            margin-bottom: 20px;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-8px); }
        }

        /* Phong bì thư */
        .envelope-wrapper {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            margin: 20px 0;
        }
        .envelope {
            width: 180px;
            height: 120px;
            background: #ff758f;
            margin: 0 auto;
            position: relative;
            cursor: pointer;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.5s;
        }
        .envelope:hover {
            transform: scale(1.05);
        }
        .flap {
            position: absolute;
            top: 0;
            left: 0;
            border-left: 90px solid transparent;
            border-right: 90px solid transparent;
            border-top: 65px solid #ff4d6d;
            transform-origin: top;
            transition: transform 0.4s ease;
            z-index: 3;
        }
        .envelope.open .flap {
            transform: rotateX(180deg);
        }

        /* Bức thư lời chúc */
        .letter-card {
            display: none;
            max-height: 350px;
            overflow-y: auto;
            text-align: left;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
            border: 2px dashed #ffb3c6;
            margin-top: 15px;
        }
        .letter-content {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #4a4a4a;
            white-space: pre-wrap;
        }
        .signature {
            margin-top: 20px;
            text-align: right;
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #c9184a;
            font-weight: bold;
            opacity: 0;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://api.mp3.zing.vn/api/streaming/audio/ZWAF6O8O/320" type="audio/mpeg">
    </audio>

    <div class="glass-card">
        <div id="cakeSection">
            <div class="cake-container" onclick="extinguishCandle()">
                <span class="flame" id="flame">🔥</span>🍰
            </div>
            <p id="hintText" class="hint-text">Chạm nhẹ vào ngọn nến để thổi tắt nè! 🌬️</p>
        </div>
        
        <div id="envelopeWrapper" class="envelope-wrapper">
            <p class="hint-text" style="animation: none; margin-bottom: 10px;">Nhạc đã lên! Click mở thư nhé em 💌</p>
            <div class="envelope" id="envelope" onclick="openEnvelope()">
                <div class="flap"></div>
            </div>
        </div>

        <div id="letterCard" class="letter-card">
            <div id="typewriter" class="letter-content"></div>
            <div id="sig" class="signature">From Thanh Sơn with love :’)</div>
        </div>
    </div>

    <script>

            p.innerHTML = ['🌸', '💮', '💖'][Math.floor(Math.random() * 3)];

            p.style.animationDuration = Math.random() * 3 + 3 + 's';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }
        setInterval(createPetal, 400);
